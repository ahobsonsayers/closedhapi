name: Build and Push Docker Image

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/build.yaml
      - Dockerfile
      - entrypoint.d/**
      - scripts/**
  schedule:
    - cron: "0 6 * * *" # Everyday at 6am
  workflow_dispatch:
    inputs:
      no-cache:
        description: No Cache
        type: boolean
        default: false

env:
  DOCKER_IMAGE: arranhs/closedhapi

jobs:
  get-versions:
    name: Get versions
    runs-on: ubuntu-latest
    timeout-minutes: 10

    outputs:
      opencode-version: ${{ steps.extract-versions.outputs.opencode }}
      hapi-version: ${{ steps.extract-versions.outputs.hapi }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Extract versions
        id: extract-versions
        run: |
          OPENCODE_VERSION=$(grep "^FROM arranhs/closedcode:" Dockerfile | cut -d ':' -f2)
          HAPI_VERSION=$(grep "^ARG HAPI_VERSION=" Dockerfile | cut -d '=' -f2)

          echo "opencode=$OPENCODE_VERSION" >> $GITHUB_OUTPUT
          echo "hapi=$HAPI_VERSION" >> $GITHUB_OUTPUT

          echo "
          OpenCode Version: $OPENCODE_VERSION
          Hapi Version: $HAPI_VERSION
          "

  build:
    name: Build Image

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            platform: linux/amd64
            platform-slug: linux-amd64

          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            platform-slug: linux-arm64

    runs-on: ${{ matrix.runner }}
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          tags: ${{ env.DOCKER_IMAGE }}
          cache-from: ${{ !inputs.no-cache && 'type=gha' || '' }}
          cache-to: ${{ !inputs.no-cache && 'type=gha,mode=max' || '' }}
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true

      - name: Output digest
        uses: GoCodeAlone/github-action-matrix-outputs-write@1.0.3
        with:
          matrix-step-name: build
          matrix-key: ${{ matrix.platform-slug }}
          outputs: |
            digest: ${{ steps.build.outputs.digest }}

  push-tags:
    name: Push Tags
    runs-on: ubuntu-latest
    needs: [get-versions, build]
    timeout-minutes: 10

    steps:
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Get digests
        id: get-digests
        uses: GoCodeAlone/github-action-matrix-outputs-read@1.0.6
        with:
          matrix-step-name: build

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Push tags
        run: |
          DIGESTS=$(
            echo "$DIGESTS_JSON" |
            jq -r --arg docker_image "$DOCKER_IMAGE" \
              '.digest | to_entries[] | "\($docker_image)@\(.value)"'
          )

          docker buildx imagetools create \
            -t "$DOCKER_IMAGE:latest" \
            -t "$DOCKER_IMAGE:$OPENCODE_VERSION" \
            -t "$DOCKER_IMAGE:hapi-$HAPI_VERSION-opencode-$OPENCODE_VERSION" \
            $DIGESTS
        env:
          DIGESTS_JSON: ${{ steps.get-digests.outputs.result }}
          DOCKER_IMAGE: ${{ env.DOCKER_IMAGE }}
          OPENCODE_VERSION: ${{ needs.get-versions.outputs.opencode-version }}
          HAPI_VERSION: ${{ needs.get-versions.outputs.hapi-version }}
